<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menü Kayboldu</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at top, #1a1410, #0d0a08);
    font-family:'Segoe UI',system-ui,sans-serif;
    color:#f5f0e6;
    text-align:center;
    padding:24px;
    overflow:hidden;
  }
  .card{
    max-width:420px;
    position:relative;
    z-index:2;
  }
  .emoji{
    font-size:70px;
    display:inline-block;
    animation:float 3s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-14px) rotate(-6deg);}
  }
  h1{
    font-size:24px;
    color:#d4af37;
    margin:20px 0 10px;
  }
  p{
    color:#a89a82;
    font-size:15px;
    line-height:1.6;
  }
  .fine{
    margin-top:24px;
    font-size:12px;
    color:#5c5040;
    font-style:italic;
  }
  .particles span{
    position:absolute;
    font-size:22px;
    opacity:0.5;
    animation:drift 8s linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0.6;}
    100%{transform:translateY(-600px) translateX(40px) rotate(360deg); opacity:0;}
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="card">
  <img src="zuware.png" alt="logo" style="max-width:140px;margin-bottom:16px;" />
  <h1>Zuware Software and Technology Innovation</h1>
</div>

<script>
const emojis = ['🍽️','💸','🔒','🙈','⏳'];
const container = document.getElementById('particles');
for(let i=0;i<15;i++){
  const s = document.createElement('span');
  s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  s.style.left = Math.random()*100 + '%';
  s.style.bottom = '-40px';
  s.style.animationDelay = (Math.random()*8) + 's';
  s.style.animationDuration = (6 + Math.random()*4) + 's';
  container.appendChild(s);
}
</script>

</body>
</html>
